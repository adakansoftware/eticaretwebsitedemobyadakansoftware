name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.STAGING_AUTH_SECRET }}
      NEXT_PUBLIC_SITE_URL: ${{ secrets.STAGING_SITE_URL }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run verify
      - run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
      - run: npx vercel build --token="$VERCEL_TOKEN"
      - run: npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"
